<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>數位技能卡系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  
  <style>
    /* 確保 3D 翻轉效果在所有瀏覽器正常運作 */
    .preserve-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
  </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800">
  
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
  
    // --- 1. 初始化 Firebase (已填入您的專屬金鑰) ---
    const customFirebaseConfig = {
      apiKey: "AIzaSyCi1ltDPRUd1LE3_Rf42YaRF1K28tY9FRE",
      authDomain: "card-8ba7e.firebaseapp.com",
      projectId: "card-8ba7e",
      storageBucket: "card-8ba7e.firebasestorage.app",
      messagingSenderId: "111155281491",
      appId: "1:111155281491:web:1b6e6da300291e9e6450a6",
      measurementId: "G-CWMC69DRFC"
    };
  
    let app, auth, db;
    const appId = 'digital-skill-card';
     
    try {
      if (!firebase.apps.length) {
        app = firebase.initializeApp(customFirebaseConfig);
      } else {
        app = firebase.app();
      }
      auth = firebase.auth();
      db = firebase.firestore();
    } catch (e) {
      console.error("Firebase 初始化失敗:", e);
    }
  
    // --- 圖片壓縮工具 ---
    const resizeImage = (file, maxWidth = 400) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ratio = maxWidth / img.width;
            canvas.width = maxWidth;
            canvas.height = img.height * ratio;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', 0.8));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };
  
    // --- 學生背包的翻轉卡片組件 ---
    const FlipCard = ({ card, idx, total, categoryImages }) => {
      const [isFlipped, setIsFlipped] = useState(false);
      const cardDataUrl = typeof card === 'string' ? card : card.dataUrl;
      const category = typeof card === 'string' ? '預設' : (card.category || '預設');
  
      const renderBackCover = () => {
        if (categoryImages && categoryImages[category]) {
          return (
            <div className="absolute inset-0 w-full h-full rounded-xl shadow-lg border-4 border-slate-200 bg-white group-hover:shadow-xl group-hover:scale-[1.02] transition-all flex items-center justify-center p-2 backface-hidden">
              <img src={categoryImages[category]} alt={category} className="w-full h-full object-contain" />
            </div>
          );
        }
  
        const config = {
          '食': { bg: 'from-green-400 to-emerald-600', icon: <i className="fa-solid fa-utensils text-5xl text-white drop-shadow"></i> },
          '衣': { bg: 'from-pink-400 to-rose-600', icon: <i className="fa-solid fa-shirt text-5xl text-white drop-shadow"></i> },
          '住': { bg: 'from-teal-400 to-cyan-600', icon: <i className="fa-solid fa-house text-5xl text-white drop-shadow"></i> },
          '行': { bg: 'from-blue-400 to-indigo-600', icon: <i className="fa-solid fa-car-side text-5xl text-white drop-shadow"></i> },
          '育': { bg: 'from-orange-400 to-amber-600', icon: <i className="fa-solid fa-book-open text-5xl text-white drop-shadow"></i> },
          '樂': { bg: 'from-yellow-400 to-orange-500', icon: <i className="fa-solid fa-gamepad text-5xl text-white drop-shadow"></i> },
          '隱藏': { bg: 'from-purple-500 to-fuchsia-700', icon: <i className="fa-solid fa-circle-question text-5xl text-white drop-shadow animate-pulse"></i> },
          '預設': { bg: 'from-indigo-500 to-purple-600', icon: <i className="fa-solid fa-gem text-5xl text-white drop-shadow animate-pulse"></i> },
        };
        const style = config[category] || config['預設'];
  
        return (
          <div className={`absolute inset-0 w-full h-full rounded-xl shadow-lg border-4 border-white bg-gradient-to-br ${style.bg} flex flex-col items-center justify-center group-hover:shadow-xl group-hover:scale-[1.02] transition-all backface-hidden`}>
            <div className="border-2 border-white/40 border-dashed rounded-lg w-10/12 h-[95%] flex flex-col items-center justify-center relative">
              <div className="absolute top-4 left-4 text-white opacity-40">✨</div>
              <div className="absolute bottom-4 right-4 text-white opacity-40">✨</div>
              {style.icon}
              <span className="text-white font-bold tracking-widest text-xl mt-4 drop-shadow-md">{category !== '預設' ? category : '神秘'}卡</span>
              <span className="text-white/80 text-sm mt-1">點擊翻開</span>
            </div>
          </div>
        );
      };
  
      return (
        <div className="flex flex-col items-center">
          <div 
            className="relative w-full cursor-pointer group" 
            style={{ perspective: '1000px', aspectRatio: '450/800' }}
            onClick={() => setIsFlipped(!isFlipped)}
          >
            <div className="w-full h-full transition-transform duration-700 ease-in-out preserve-3d" style={{ transform: isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)' }}>
              {renderBackCover()}
              <div className="absolute inset-0 w-full h-full rounded-xl shadow-md border border-slate-200 bg-white overflow-hidden group-hover:shadow-xl transition-shadow backface-hidden" style={{ transform: 'rotateY(180deg)' }}>
                <img src={cardDataUrl} alt="技能卡" className="w-full h-full object-cover" />
              </div>
            </div>
          </div>
          <div className={`text-center text-sm font-bold mt-3 transition-colors duration-500 ${isFlipped ? 'text-amber-700' : 'text-slate-400'}`}>
            {isFlipped ? `⭐ 獲得卡片 #${total - idx}` : `${category !== '預設' ? `[${category}] ` : ''}尚未翻開`}
          </div>
        </div>
      );
    };
  
    // --- 主應用程式元件 ---
    const App = () => {
      const [activeTab, setActiveTab] = useState('teacher');
      const [message, setMessage] = useState('');
      const [user, setUser] = useState(null);
      const [dbError, setDbError] = useState('');
  
      const [headImgUrl, setHeadImgUrl] = useState(null);
      const [footImgUrl, setFootImgUrl] = useState(null);
      const [fontName, setFontName] = useState('BiauKai');
      const [skillsText, setSkillsText] = useState('(食)我會自己洗碗\n(衣)我會摺衣服\n我會準時上學');
      const [dateText, setDateText] = useState('1150326 特教教室');
      const [stagedCards, setStagedCards] = useState([]);
  
      const [categoryImages, setCategoryImages] = useState({});
      const [showSettings, setShowSettings] = useState(false);
      const categoriesList = ['食', '衣', '住', '行', '育', '樂', '隱藏'];
  
      const [students, setStudents] = useState([]);
      const [newStudentName, setNewStudentName] = useState('');
      const [selectedStudentIds, setSelectedStudentIds] = useState([]);
      const [viewingStudentId, setViewingStudentId] = useState('');
  
      const previewCanvasRef = useRef(null);
  
      const showMessage = (msg) => {
        setMessage(msg);
        setTimeout(() => setMessage(''), 3000);
      };
  
      useEffect(() => {
        if (!auth) {
          setDbError("⚠️ 無法載入 Firebase，請確認網路連線。");
          return;
        }
        auth.signInAnonymously().catch(e => {
          console.error("匿名登入失敗:", e);
          setDbError("⚠️ 登入失敗：請確認 Firebase 已開啟匿名登入服務。");
        });
        const unsubscribe = auth.onAuthStateChanged(u => {
          setUser(u);
          if (u) setDbError('');
        });
        return () => unsubscribe();
      }, []);
  
      useEffect(() => {
        if (!user || !db) return;
        const studentsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('students');
        const unsubStudents = studentsRef.onSnapshot((snapshot) => {
          const studentsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          studentsData.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
          setStudents(studentsData);
        }, (err) => {
          console.error("Firestore 錯誤:", err);
          setDbError("⚠️ 資料庫權限問題，請確認規則為測試模式。");
        });
        const settingsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('categoryImages');
        const unsubSettings = settingsRef.onSnapshot((docSnap) => {
          if (docSnap.exists) setCategoryImages(docSnap.data());
        });
        return () => { unsubStudents(); unsubSettings(); };
      }, [user]);
  
      const handleImageUpload = (e, setter) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => setter(event.target.result);
          reader.readAsDataURL(file);
        }
      };
  
      const parseSkillsText = (text) => {
        const segments = [];
        const parts = text.split(/((?:\(|（)(?:食|衣|住|行|育|樂|隱藏)(?:\)|）)我|過)/);
        let currentCategory = '預設';
        let currentText = '';
        for (let p of parts) {
          if (!p) continue;
          const catMatch = p.match(/^(?:\(|（)(食|衣|住|行|育|樂|隱藏)(?:\)|）)我$/);
          if (catMatch) {
            if (currentText.trim()) segments.push({ category: currentCategory, text: currentText.trim() });
            currentCategory = catMatch[1];
            currentText = '我';
          } else if (p === '我') {
            if (currentText.trim()) segments.push({ category: currentCategory, text: currentText.trim() });
            currentCategory = '預設';
            currentText = '我';
          } else {
            currentText += p;
          }
        }
        if (currentText.trim()) segments.push({ category: currentCategory, text: currentText.trim() });
        return segments;
      };
  
      const drawCardOnCanvas = async (seg, canvas, ctx) => {
        const headImg = await loadImageData(headImgUrl);
        const footImg = await loadImageData(footImgUrl);
        const lines = seg.text.split(' ').filter(l => l !== '');

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (headImg) {
          let hRatio = canvas.width / headImg.width;
          ctx.drawImage(headImg, 0, 0, canvas.width, headImg.height * hRatio);
        }

        let footerY = 600;
        if (footImg) {
          let targetWidth = canvas.width - 40;
          let ratio = targetWidth / footImg.width;
          let drawHeight = footImg.height * ratio;
          let y = canvas.height - drawHeight - 20;
          ctx.drawImage(footImg, 20, y, targetWidth, drawHeight);
          footerY = y;
        }

        ctx.fillStyle = "#000000";
        ctx.textAlign = "left";
        ctx.font = `16px "${fontName}", sans-serif`;
        ctx.fillText(dateText, 45, footerY - 8);

        ctx.textAlign = "center";
        let fontSize = 40;
        ctx.font = `bold ${fontSize}px "${fontName}", sans-serif`;
        lines.forEach((line, i) => ctx.fillText(line, canvas.width/2, 350 + (i * (fontSize + 15))));
      };
  
      useEffect(() => {
        const updatePreview = async () => {
          const canvas = previewCanvasRef.current;
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          const parsed = parseSkillsText(skillsText);
          await drawCardOnCanvas(parsed[0] || { category: '預設', text: '預覽' }, canvas, ctx);
        };
        updatePreview();
      }, [headImgUrl, footImgUrl, skillsText, dateText]);
  
      const generateCards = async () => {
        if (!skillsText.trim()) return showMessage('請輸入文字');
        const parsed = parseSkillsText(skillsText);
        const canvas = document.createElement('canvas');
        canvas.width = 450; canvas.height = 800;
        const ctx = canvas.getContext('2d');
        const newCards = [];
        for (let seg of parsed) {
          await drawCardOnCanvas(seg, canvas, ctx);
          newCards.push({ dataUrl: canvas.toDataURL('image/jpeg', 0.8), category: seg.category, backpackName: dateText || '預設' });
        }
        setStagedCards(prev => [...newCards, ...prev]);
        showMessage(`✅ 生成 ${newCards.length} 張卡片！`);
      };
  
      const addStudent = async () => {
        if (!newStudentName.trim() || !user) return;
        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('students').add({ name: newStudentName, cards: [], createdAt: Date.now() });
        setNewStudentName('');
        showMessage('✅ 學生已新增');
      };
  
      const distributeCard = async (cardObj) => {
        if (selectedStudentIds.length === 0) return showMessage('⚠️ 請勾選學生');
        const promises = selectedStudentIds.map(async (id) => {
          const s = students.find(x => x.id === id);
          if (s) await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('students').doc(id).update({ cards: [cardObj, ...(s.cards || [])] });
        });
        await Promise.all(promises);
        showMessage('✅ 派發成功');
      };
  
      return (
        <div className="min-h-screen bg-slate-100 flex flex-col items-center">
          {message && <div className="fixed top-5 z-50 bg-blue-600 text-white px-6 py-3 rounded-full shadow-lg">{message}</div>}
          <header className="w-full bg-white shadow-sm flex items-center justify-between px-6 py-4 max-w-6xl mt-4 rounded-xl border border-slate-200">
            <div className="flex flex-col">
              <h1 className="text-2xl font-bold text-blue-800 flex items-center gap-2"><i className="fa-solid fa-gem text-blue-500"></i> 數位技能卡系統</h1>
              <span className={`text-xs font-bold ml-10 flex items-center gap-1 ${dbError ? 'text-red-500' : 'text-green-600'}`}>
                <span className={`w-2 h-2 rounded-full ${dbError ? 'bg-red-500' : 'bg-green-500 animate-pulse'}`}></span> {dbError ? dbError : '雲端儲存已連線'}
              </span>
            </div>
            <div className="flex bg-slate-100 p-1 rounded-lg">
              <button onClick={() => setActiveTab('teacher')} className={`px-6 py-2 rounded-md font-medium ${activeTab === 'teacher' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500'}`}>教師中心</button>
              <button onClick={() => setActiveTab('student')} className={`px-6 py-2 rounded-md font-medium ${activeTab === 'student' ? 'bg-white shadow-sm text-green-700' : 'text-slate-500'}`}>學生背包</button>
            </div>
          </header>
  
          {activeTab === 'teacher' ? (
            <main className="w-full max-w-6xl flex flex-col md:flex-row gap-6 mt-6 pb-12">
              <section className="w-full md:w-1/3 bg-white p-6 rounded-xl shadow-sm border space-y-4">
                <h2 className="font-bold border-b pb-2">卡片生成器</h2>
                <input type="file" onChange={(e) => handleImageUpload(e, setHeadImgUrl)} className="w-full text-xs" />
                <input type="file" onChange={(e) => handleImageUpload(e, setFootImgUrl)} className="w-full text-xs" />
                <textarea value={skillsText} onChange={(e) => setSkillsText(e.target.value)} className="w-full p-2 border rounded-md h-24 text-sm" />
                <input type="text" value={dateText} onChange={(e) => setDateText(e.target.value)} className="w-full p-2 border rounded-md text-sm" />
                <canvas ref={previewCanvasRef} width="450" height="800" className="w-full max-w-[150px] mx-auto border" />
                <button onClick={generateCards} className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">產生技能卡</button>
              </section>
              <section className="w-full md:w-2/3 space-y-6">
                <div className="bg-white p-6 rounded-xl shadow-sm border">
                  <h2 className="font-bold border-b pb-2 mb-4">學生名單</h2>
                  <div className="flex gap-2 mb-4">
                    <input value={newStudentName} onChange={(e) => setNewStudentName(e.target.value)} className="flex-1 p-2 border rounded-md text-sm" />
                    <button onClick={addStudent} className="bg-indigo-500 text-white px-4 py-2 rounded-md text-sm">新增</button>
                  </div>
                  <div className="border rounded-md max-h-40 overflow-y-auto">
                    {students.map(s => (
                      <div key={s.id} className="flex items-center px-4 py-2 border-b">
                        <input type="checkbox" checked={selectedStudentIds.includes(s.id)} onChange={() => setSelectedStudentIds(prev => prev.includes(s.id) ? prev.filter(x => x !== s.id) : [...prev, s.id])} className="mr-3" />
                        <span className="flex-1 text-sm">{s.name}</span>
                        <span className="text-xs bg-indigo-100 px-2 rounded">{(s.cards || []).length}張</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="bg-white p-6 rounded-xl shadow-sm border">
                  <h2 className="font-bold border-b pb-2 mb-4 text-green-600">卡片暫存區</h2>
                  <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                    {stagedCards.map((c, i) => (
                      <div key={i} className="border p-2 rounded-lg text-center">
                        <img src={c.dataUrl} className="w-full h-32 object-contain mb-2" />
                        <button onClick={() => distributeCard(c)} className="bg-green-500 text-white text-xs w-full py-1 rounded">發送</button>
                      </div>
                    ))}
                  </div>
                </div>
              </section>
            </main>
          ) : (
            <main className="w-full max-w-4xl mt-6 pb-12">
              <div className="bg-white p-8 rounded-xl shadow-sm border text-center">
                <select value={viewingStudentId} onChange={(e) => setViewingStudentId(e.target.value)} className="w-full p-3 border-2 rounded-lg font-bold text-indigo-800">
                  <option value="">--- 請選擇學生姓名 ---</option>
                  {students.map(s => <option key={s.id} value={s.id}>{s.name} ({(s.cards || []).length} 張)</option>)}
                </select>
                {viewingStudentId && (
                  <div className="mt-8 grid grid-cols-2 md:grid-cols-4 gap-6">
                    {students.find(s => s.id === viewingStudentId)?.cards.map((c, i) => (
                      <FlipCard key={i} card={c} idx={i} total={students.find(s => s.id === viewingStudentId).cards.length} categoryImages={categoryImages} />
                    ))}
                  </div>
                )}
              </div>
            </main>
          )}
        </div>
      );
    };
  
    const loadImageData = (src) => new Promise(r => { if (!src) return r(null); const img = new Image(); img.onload = () => r(img); img.src = src; });
  
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
