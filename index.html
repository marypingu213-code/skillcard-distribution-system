<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>數位技能卡系統</title>

  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <style>
    .preserve-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
  </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // --- 1. 初始化 Firebase (已填入您的專案金鑰) ---
    const customFirebaseConfig = {
      apiKey: "AIzaSyCi1ltDPRUd1LE3_Rf42YaRf1K28tY9FRE",
      authDomain: "card-8ba7e.firebaseapp.com",
      projectId: "card-8ba7e",
      storageBucket: "card-8ba7e.firebasestorage.app",
      messagingSenderId: "111155281491",
      appId: "1:111155281491:web:1b6e6da300291e9e6450a6",
      measurementId: "G-CWMC69DRFC"
    };

    let app, auth, db;
    const appId = 'digital-skill-card';
    
    try {
      if (!firebase.apps.length) {
        app = firebase.initializeApp(customFirebaseConfig);
      } else {
        app = firebase.app();
      }
      auth = firebase.auth();
      db = firebase.firestore();
    } catch (e) {
      console.error("Firebase 初始化失敗:", e);
    }

    // --- 圖片壓縮工具 ---
    const resizeImage = (file, maxWidth = 400) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ratio = maxWidth / img.width;
            canvas.width = maxWidth;
            canvas.height = img.height * ratio;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', 0.8));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    // --- 學生背包的翻轉卡片組件 ---
    const FlipCard = ({ card, idx, total, categoryImages }) => {
      const [isFlipped, setIsFlipped] = useState(false);
      const cardDataUrl = typeof card === 'string' ? card : card.dataUrl;
      const category = typeof card === 'string' ? '預設' : (card.category || '預設');

      const renderBackCover = () => {
        if (categoryImages && categoryImages[category]) {
          return (
            <div className="absolute inset-0 w-full h-full rounded-xl shadow-lg border-4 border-slate-200 bg-white flex items-center justify-center p-2 backface-hidden">
              <img src={categoryImages[category]} alt={category} className="w-full h-full object-contain" />
            </div>
          );
        }

        const config = {
          '食': { bg: 'from-green-400 to-emerald-600', icon: <i className="fa-solid fa-utensils text-5xl text-white"></i> },
          '衣': { bg: 'from-pink-400 to-rose-600', icon: <i className="fa-solid fa-shirt text-5xl text-white"></i> },
          '住': { bg: 'from-teal-400 to-cyan-600', icon: <i className="fa-solid fa-house text-5xl text-white"></i> },
          '行': { bg: 'from-blue-400 to-indigo-600', icon: <i className="fa-solid fa-car-side text-5xl text-white"></i> },
          '育': { bg: 'from-orange-400 to-amber-600', icon: <i className="fa-solid fa-book-open text-5xl text-white"></i> },
          '樂': { bg: 'from-yellow-400 to-orange-500', icon: <i className="fa-solid fa-gamepad text-5xl text-white"></i> },
          '隱藏': { bg: 'from-purple-500 to-fuchsia-700', icon: <i className="fa-solid fa-circle-question text-5xl text-white"></i> },
          '預設': { bg: 'from-indigo-500 to-purple-600', icon: <i className="fa-solid fa-gem text-5xl text-white"></i> },
        };
        const style = config[category] || config['預設'];

        return (
          <div className={`absolute inset-0 w-full h-full rounded-xl shadow-lg border-4 border-white bg-gradient-to-br ${style.bg} flex flex-col items-center justify-center backface-hidden`}>
            <div className="border-2 border-white/40 border-dashed rounded-lg w-10/12 h-[95%] flex flex-col items-center justify-center relative">
              {style.icon}
              <span className="text-white font-bold text-xl mt-4">{category !== '預設' ? category : '神秘'}卡</span>
              <span className="text-white/80 text-sm mt-1">點擊翻開</span>
            </div>
          </div>
        );
      };

      return (
        <div className="flex flex-col items-center">
          <div className="relative w-full cursor-pointer group" style={{ perspective: '1000px', aspectRatio: '450/800' }} onClick={() => setIsFlipped(!isFlipped)}>
            <div className="w-full h-full transition-transform duration-700 ease-in-out preserve-3d" style={{ transform: isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)' }}>
              {renderBackCover()}
              <div className="absolute inset-0 w-full h-full rounded-xl shadow-md border border-slate-200 bg-white overflow-hidden backface-hidden" style={{ transform: 'rotateY(180deg)' }}>
                <img src={cardDataUrl} alt="技能卡" className="w-full h-full object-cover" />
              </div>
            </div>
          </div>
          <div className={`text-center text-sm font-bold mt-3 ${isFlipped ? 'text-amber-700' : 'text-slate-400'}`}>
            {isFlipped ? `⭐ 獲得卡片 #${total - idx}` : `${category !== '預設' ? `[${category}] ` : ''}尚未翻開`}
          </div>
        </div>
      );
    };

    // --- 主應用程式 ---
    const App = () => {
      const [activeTab, setActiveTab] = useState('teacher');
      const [message, setMessage] = useState('');
      const [user, setUser] = useState(null);
      const [headImgUrl, setHeadImgUrl] = useState(null);
      const [footImgUrl, setFootImgUrl] = useState(null);
      const [fontName, setFontName] = useState('BiauKai');
      const [skillsText, setSkillsText] = useState('(食)我會自己洗碗\n(衣)我會摺衣服\n我會準時上學');
      const [dateText, setDateText] = useState('1150326 特教教室');
      const [stagedCards, setStagedCards] = useState([]);
      const [categoryImages, setCategoryImages] = useState({});
      const [showSettings, setShowSettings] = useState(false);
      const [students, setStudents] = useState([]);
      const [newStudentName, setNewStudentName] = useState('');
      const [selectedStudentIds, setSelectedStudentIds] = useState([]);
      const [viewingStudentId, setViewingStudentId] = useState('');
      const previewCanvasRef = useRef(null);

      const showMessage = (msg) => {
        setMessage(msg);
        setTimeout(() => setMessage(''), 3000);
      };

      useEffect(() => {
        if (!auth) return;
        auth.signInAnonymously().catch(e => console.error("匿名登入失敗:", e));
        const unsubscribe = auth.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !db) return;
        const studentsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('students');
        const unsubStudents = studentsRef.onSnapshot((snapshot) => {
          const studentsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          studentsData.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
          setStudents(studentsData);
        });
        const settingsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('categoryImages');
        const unsubSettings = settingsRef.onSnapshot((docSnap) => {
          if (docSnap.exists) setCategoryImages(docSnap.data());
        });
        return () => { unsubStudents(); unsubSettings(); };
      }, [user]);

      const handleImageUpload = (e, setter) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => setter(event.target.result);
          reader.readAsDataURL(file);
        }
      };

      const parseSkillsText = (text) => {
        const segments = [];
        const parts = text.split(/((?:\(|（)(?:食|衣|住|行|育|樂|隱藏)(?:\)|）)我|我)/);
        let currentCategory = '預設';
        let currentText = '';
        for (let p of parts) {
          if (!p) continue;
          const catMatch = p.match(/^(?:\(|（)(食|衣|住|行|育|樂|隱藏)(?:\)|）)我$/);
          if (catMatch) {
            if (currentText.trim()) segments.push({ category: currentCategory, text: currentText.trim() });
            currentCategory = catMatch[1];
            currentText = '我';
          } else if (p === '我') {
            if (currentText.trim()) segments.push({ category: currentCategory, text: currentText.trim() });
            currentCategory = '預設';
            currentText = '我';
          } else {
            currentText += p;
          }
        }
        if (currentText.trim()) segments.push({ category: currentCategory, text: currentText.trim() });
        return segments;
      };

      const generateCards = async () => {
        if (!skillsText.trim()) return showMessage('請輸入技能文字');
        const parsedSegments = parseSkillsText(skillsText);
        const canvas = document.createElement('canvas');
        canvas.width = 450; canvas.height = 800;
        const ctx = canvas.getContext('2d');
        const headImg = await new Promise(r => { if(!headImgUrl) return r(null); const i=new Image(); i.onload=()=>r(i); i.src=headImgUrl; });
        const footImg = await new Promise(r => { if(!footImgUrl) return r(null); const i=new Image(); i.onload=()=>r(i); i.src=footImgUrl; });

        const newCards = parsedSegments.map(seg => {
          ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
          if(headImg) ctx.drawImage(headImg, 0, 0, canvas.width, headImg.height * (canvas.width/headImg.width));
          if(footImg) ctx.drawImage(footImg, canvas.width - (footImg.width*(250/footImg.height)) - 5, canvas.height - 255, footImg.width*(250/footImg.height), 250);
          ctx.fillStyle = "#000000"; ctx.font = `20px sans-serif`; ctx.fillText(dateText, 40, 630);
          ctx.textAlign = "center"; ctx.font = `bold 40px sans-serif`;
          const lines = seg.text.split(' ');
          lines.forEach((l, i) => ctx.fillText(l, canvas.width/2, 350 + i*55));
          return { dataUrl: canvas.toDataURL('image/jpeg', 0.8), category: seg.category, backpackName: dateText || '預設' };
        });
        setStagedCards(prev => [...newCards, ...prev]);
        showMessage(`✅ 生成 ${newCards.length} 張卡片！`);
      };

      const addStudent = async () => {
        if (!newStudentName.trim() || !user) return;
        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('students').add({ name: newStudentName, cards: [], createdAt: Date.now() });
        setNewStudentName('');
        showMessage('✅ 學生已新增！');
      };

      const distributeCard = async (cardObj) => {
        if (selectedStudentIds.length === 0) return showMessage('⚠️ 請先勾選學生！');
        const promises = selectedStudentIds.map(async (id) => {
          const s = students.find(x => x.id === id);
          if (s) await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('students').doc(id).update({ cards: [cardObj, ...(s.cards || [])] });
        });
        await Promise.all(promises);
        showMessage('✅ 卡片已派發！');
      };

      return (
        <div className="min-h-screen flex flex-col items-center p-4">
          {message && <div className="fixed top-5 z-50 bg-blue-600 text-white px-6 py-3 rounded-full shadow-lg">{message}</div>}
          <header className="w-full max-w-6xl bg-white p-4 rounded-xl shadow-sm flex justify-between items-center mb-6">
            <h1 className="text-xl font-bold text-blue-800"><i className="fa-solid fa-gem"></i> 數位技能卡系統</h1>
            <div className="flex bg-slate-100 p-1 rounded-lg">
              <button onClick={() => setActiveTab('teacher')} className={`px-4 py-2 rounded-md ${activeTab === 'teacher' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500'}`}>教師中心</button>
              <button onClick={() => setActiveTab('student')} className={`px-4 py-2 rounded-md ${activeTab === 'student' ? 'bg-white shadow-sm text-green-700' : 'text-slate-500'}`}>學生背包</button>
            </div>
          </header>

          {activeTab === 'teacher' ? (
            <div className="w-full max-w-6xl grid grid-cols-1 md:grid-cols-3 gap-6">
              <div className="bg-white p-6 rounded-xl shadow-sm space-y-4">
                <h2 className="font-bold border-b pb-2">卡片生成器</h2>
                <input type="file" onChange={(e) => handleImageUpload(e, setHeadImgUrl)} className="w-full text-xs" />
                <textarea value={skillsText} onChange={e=>setSkillsText(e.target.value)} className="w-full p-2 border rounded h-24 text-sm" placeholder="(食)我會洗碗" />
                <input type="text" value={dateText} onChange={e=>setDateText(e.target.value)} className="w-full p-2 border rounded text-sm" />
                <button onClick={generateCards} className="w-full bg-blue-600 text-white py-2 rounded-lg font-bold">產生卡片</button>
              </div>
              <div className="md:col-span-2 space-y-6">
                <div className="bg-white p-6 rounded-xl shadow-sm">
                  <h2 className="font-bold border-b pb-2 mb-4">學生名單</h2>
                  <div className="flex gap-2 mb-4">
                    <input value={newStudentName} onChange={e=>setNewStudentName(e.target.value)} className="flex-1 p-2 border rounded text-sm" placeholder="學生姓名" />
                    <button onClick={addStudent} className="bg-indigo-500 text-white px-4 py-2 rounded text-sm">新增</button>
                  </div>
                  <div className="max-h-40 overflow-y-auto border rounded">
                    {students.map(s => (
                      <div key={s.id} className="flex items-center p-2 border-b">
                        <input type="checkbox" checked={selectedStudentIds.includes(s.id)} onChange={()=>{
                          setSelectedStudentIds(prev => prev.includes(s.id) ? prev.filter(x=>x!==s.id) : [...prev, s.id])
                        }} className="mr-2" />
                        <span className="flex-1 text-sm">{s.name}</span>
                        <span className="text-xs bg-gray-100 px-2 rounded">{(s.cards||[]).length}張</span>
                      </div>
                    ))}
                    {!user && <div className="p-2 text-center text-xs text-gray-400">連線中...</div>}
                  </div>
                </div>
                <div className="bg-white p-6 rounded-xl shadow-sm">
                  <h2 className="font-bold border-b pb-2 mb-4">暫存卡片</h2>
                  <div className="grid grid-cols-3 gap-4">
                    {stagedCards.map((c, i) => (
                      <div key={i} className="border p-2 rounded text-center">
                        <img src={c.dataUrl} className="w-full h-32 object-contain mb-2" />
                        <button onClick={()=>distributeCard(c)} className="bg-green-500 text-white text-xs px-2 py-1 rounded">派發</button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          ) : (
            <div className="w-full max-w-4xl bg-white p-8 rounded-xl shadow-sm text-center">
              <select value={viewingStudentId} onChange={e=>setViewingStudentId(e.target.value)} className="w-full p-3 border-2 rounded-lg font-bold text-indigo-800">
                <option value="">請選擇學生</option>
                {students.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
              {viewingStudentId && (
                <div className="mt-8 grid grid-cols-2 md:grid-cols-4 gap-6">
                  {students.find(s=>s.id===viewingStudentId)?.cards.map((c, i) => (
                    <FlipCard key={i} card={c} idx={i} total={students.find(s=>s.id===viewingStudentId).cards.length} />
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
